version: '3.8'
services:
  mongodb:
    image: mongo:latest
    container_name: trusttlayerr-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - trusttlayerr-network

networks:
  trusttlayerr-network:
    driver: bridge

volumes:
  mongodb_data:
